  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:32px;font-weight:400;letter-spacing:.005em;line-height:1.08\">{{ detail.fullName }}<\u002Fdiv>\n                  <div class=\"tn\" style=\"font-size:14px;color:#6b665c;margin-top:4px\">{{ detail.phone }}<\u002Fdiv>\n                  <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;white-space:nowrap;background:{{ detail.statusBg }};color:{{ detail.statusFg }}\">\n                    <span style=\"width:8px;height:8px;border-radius:50%;background:{{ detail.dot }}\"><\u002Fspan>{{ detail.statusLabel }}\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;gap:10px;margin-top:24px\">\n                <button onclick=\"{{ actAi }}\" style=\"flex:1;cursor:pointer;border:none;background:linear-gradient(135deg,#33245f,#20407e);color:#fff;border-radius:13px;padding:12px;font-size:14px;font-weight:600;box-shadow:0 6px 18px -4px rgba(50,50,140,.45),inset 0 1px 0 rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s\" style-active=\"transform:scale(.97)\">\n                  <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v3m0 12v3M3 12h3m12 0h3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1m0-12.8-2.1 2.1M7.7 16.3l-2.1 2.1\"><\u002Fpath><\u002Fsvg>\n                  Scrivi con l'AI\n                <\u002Fbutton>\n                <button onclick=\"{{ actNote }}\" style=\"flex:none;cursor:pointer;border:1px solid rgba(0,0,0,.1);background:#fff;color:#1a1a1a;border-radius:13px;padding:12px 16px;font-size:14px;font-weight:600;transition:transform .12s\" style-active=\"transform:scale(.97)\">Aggiungi nota<\u002Fbutton>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:26px;background:#fff;border-radius:18px;padding:6px 20px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#CBA24C;padding:16px 0 4px\">Lo fa il sistema<\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.06)\"><span style=\"color:#6b665c;font-size:14px;flex:none\">Visite<\u002Fspan><span class=\"tn\" style=\"font-weight:600;font-size:14px;text-align:right\">{{ detail.visitLine }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:7px;padding:0 0 11px;border-bottom:1px solid rgba(0,0,0,.06);font-size:12px;color:#3a6a9a\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M2 10h20M6 15h4\"><\u002Fpath><\u002Fsvg>Registrata dalla cassa Zucchetti<\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.06)\"><span style=\"color:#6b665c;font-size:14px;flex:none\">Speso in totale<\u002Fspan><span class=\"tn\" style=\"font-weight:600;font-size:14px;text-align:right\">€ {{ detail.spentFmt }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.06)\"><span style=\"color:#6b665c;font-size:14px;flex:none\">Di solito<\u002Fspan><span style=\"font-weight:600;font-size:14px;text-align:right\">{{ detail.usual }}<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{ detail.showPayment }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;justify-content:space-between;padding:11px 0\"><span style=\"color:#6b665c;font-size:14.5px\">Pagamento<\u002Fspan><span style=\"font-weight:600;font-size:14px;text-align:right\">{{ detail.paymentLine }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:20px;background:#fff;border-radius:18px;padding:18px 20px 20px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#CBA24C;margin-bottom:10px\">Le tue note<\u002Fdiv>\n                <textarea id=\"detail-notes\" value=\"{{ detail.notes }}\" oninput=\"{{ onNotes }}\" placeholder=\"Scrivi quello che vuoi… (es. 'ha la BMW', 'amico di Anastasia')\" rows=\"3\" style=\"width:100%;border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:12px;font-size:14.5px;font-style:italic;color:#3a3a3a;line-height:1.5;outline:none;background:#faf9f6\" style-focus=\"border-color:#CBA24C;background:#fff\"><\u002Ftextarea>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:20px;background:#fff;border-radius:18px;padding:18px 20px 20px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#CBA24C;margin-bottom:12px\">Le tue etichette<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                  <sc-for list=\"{{ detail.tags }}\" as=\"t\" hint-placeholder-count=\"3\">\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;padding:6px 8px 6px 12px;border-radius:9px;font-size:13px;font-weight:600;background:{{ t.bg }};color:{{ t.fg }}\">\n                      {{ t.name }}\n                      <button onclick=\"{{ t.remove }}\" style=\"all:unset;cursor:pointer;display:flex;opacity:.6\" style-hover=\"opacity:1\">\n                        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fbutton>\n                    <\u002Fspan>\n                  <\u002Fsc-for>\n                  <button onclick=\"{{ openAddTag }}\" style=\"all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:9px;font-size:13px;font-weight:600;color:#6b665c;border:1.5px dashed rgba(0,0,0,.16)\" style-hover=\"border-color:#CBA24C;color:#CBA24C\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg> nuova etichetta\n                  <\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#857f74;margin-top:11px;font-style:italic\">Se elimini un'etichetta sparisce dalla vista, ma il sistema se lo ricorda.<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"margin-top:20px;background:#fff;border-radius:18px;padding:18px 20px 20px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#CBA24C;margin-bottom:12px\">Consenso marketing<\u002Fdiv>\n                <div style=\"display:flex;background:rgba(0,0,0,.05);border-radius:12px;padding:3px;gap:3px\">\n                  <button onclick=\"{{ detail.setSi }}\" style=\"all:unset;cursor:pointer;flex:1;text-align:center;padding:9px;border-radius:9px;font-size:14px;font-weight:600;transition:all .18s;background:{{ detail.segSi.bg }};color:{{ detail.segSi.fg }};box-shadow:{{ detail.segSi.sh }}\">Sì<\u002Fbutton>\n                  <button onclick=\"{{ detail.setNo }}\" style=\"all:unset;cursor:pointer;flex:1;text-align:center;padding:9px;border-radius:9px;font-size:14px;font-weight:600;transition:all .18s;background:{{ detail.segNo.bg }};color:{{ detail.segNo.fg }};box-shadow:{{ detail.segNo.sh }}\">No<\u002Fbutton>\n                  <button onclick=\"{{ detail.setAttesa }}\" style=\"all:unset;cursor:pointer;flex:1;text-align:center;padding:9px;border-radius:9px;font-size:14px;font-weight:600;transition:all .18s;background:{{ detail.segAtt.bg }};color:{{ detail.segAtt.fg }};box-shadow:{{ detail.segAtt.sh }}\">In attesa<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#6b665c;margin-top:11px;display:flex;align-items:center;gap:7px\">\n                  <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34A853\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                  {{ detail.consentProof }}\n                <\u002Fdiv>\n                <sc-if value=\"{{ detail.isAttesa }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ detail.registerConsent }}\" style=\"width:100%;margin-top:12px;cursor:pointer;border:none;background:rgba(192,138,46,.14);color:#8a6a24;border-radius:12px;padding:11px;font-size:14px;font-weight:600\" style-active=\"transform:scale(.98)\">Registra consenso ora<\u002Fbutton>\n                <\u002Fsc-if>\n                <div style=\"font-size:12.5px;color:#857f74;margin-top:11px;line-height:1.4\">Hai sempre la prova di chi ha detto sì — con data e ora. <span style=\"color:#7a746a\">(GDPR)<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ forgetThis }}\" style=\"width:100%;margin-top:16px;cursor:pointer;background:#fff;border:1.5px solid rgba(229,72,77,.3);color:#c33236;border-radius:14px;padding:13px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px\" style-hover=\"background:rgba(229,72,77,.05)\" style-active=\"transform:scale(.98)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>Elimina la memoria AI di questo cliente<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#857f74;gap:14px;padding:40px\">\n              <svg width=\"60\" height=\"60\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n              <div style=\"font-size:15px;text-align:center;max-width:240px;line-height:1.4\">Scegli un cliente per vedere la sua scheda — è come una rubrica, ma con la memoria del locale.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DASHBOARD -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;overflow-y:auto\">\n        <div style=\"max-width:1120px;margin:0 auto;padding:26px 34px 64px\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px\">\n            <div>\n              <div style=\"font-family:'Marcellus',Georgia,serif;font-size:29px;font-weight:400;letter-spacing:.01em;line-height:1.05\">L'andamento del locale<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#6b665c;margin-top:5px\">Uno sguardo veloce a com'è andata a <b style=\"color:#1a1a1a;font-weight:600\">Tiratissima<\u002Fb>.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;background:rgba(0,0,0,.05);border-radius:11px;padding:3px;gap:3px\">\n              <button onclick=\"{{ setWeek }}\" style=\"all:unset;cursor:pointer;padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:all .18s;background:{{ per.week.bg }};color:{{ per.week.fg }};box-shadow:{{ per.week.sh }}\">Settimana<\u002Fbutton>\n              <button onclick=\"{{ setMonth }}\" style=\"all:unset;cursor:pointer;padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:all .18s;background:{{ per.month.bg }};color:{{ per.month.fg }};box-shadow:{{ per.month.sh }}\">Mese<\u002Fbutton>\n              <button onclick=\"{{ setYear }}\" style=\"all:unset;cursor:pointer;padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:all .18s;background:{{ per.year.bg }};color:{{ per.year.fg }};box-shadow:{{ per.year.sh }}\">Anno<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:15px\">\n              <div style=\"background:#fff;border-radius:20px;padding:18px 20px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                  <div style=\"width:34px;height:34px;border-radius:10px;background:rgba(206,164,78,.14);display:flex;align-items:center;justify-content:center;color:#B07E1E\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\" ight:44px;flex:none;border-radius:12px;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;color:#9a948a\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1\"><div style=\"font-size:15px;font-weight:700;color:#6b665c\">Invii mirati per etichetta<\u002Fdiv><div style=\"font-size:12.5px;color:#857f74;margin-top:2px;line-height:1.4\">Es. \"manda solo ai VIP\" o \"agli ambasciatori\". Non incluso nel pacchetto 1.<\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:12px;font-weight:700;color:#8a6a24;background:rgba(206,164,78,.16);padding:6px 13px;border-radius:20px;white-space:nowrap\">Fase 2<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border-radius:20px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55);margin-top:18px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\">\n              <div style=\"font-size:16px;font-weight:700\">Attività recente<\u002Fdiv>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#7a746a\"><span style=\"width:7px;height:7px;border-radius:50%;background:#34A853\"><\u002Fspan>WhatsApp Business · in diretta<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:14px\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)\"><div style=\"width:32px;height:32px;flex:none;border-radius:9px;background:rgba(52,168,83,.13);display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f7a3d\" stroke-width=\"2.4\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;font-size:13.5px\">Giulia Ferri ha risposto <b>SÌ<\u002Fb> — consenso registrato<\u002Fdiv><span style=\"font-size:12px;color:#7a746a;white-space:nowrap\">2 ore fa<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)\"><div style=\"width:32px;height:32px;flex:none;border-radius:9px;background:rgba(206,164,78,.13);display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a6a24\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.6-.8L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;font-size:13.5px\">Invito del richiamo inviato ad <b>Anastasia Conti<\u002Fb><\u002Fdiv><span style=\"font-size:12px;color:#7a746a;white-space:nowrap\">ieri<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)\"><div style=\"width:32px;height:32px;flex:none;border-radius:9px;background:rgba(74,127,181,.13);display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3a6a9a\" stroke-width=\"2.2\"><path d=\"M18 6 7 17l-4-4\"><\u002Fpath><path d=\"m22 10-7.5 7.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;font-size:13.5px\">\"Grazie del giorno dopo\" consegnato a <b>12 clienti<\u002Fb> di ieri sera<\u002Fdiv><span style=\"font-size:12px;color:#7a746a;white-space:nowrap\">ieri<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0\"><div style=\"width:32px;height:32px;flex:none;border-radius:9px;background:rgba(229,72,77,.12);display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c33236\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"flex:1;font-size:13.5px\"><b>Marco Vinci<\u002Fb>: nessun consenso — non riceve più messaggi<\u002Fdiv><span style=\"font-size:12px;color:#7a746a;white-space:nowrap\">3 giorni fa<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isZucchetti }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;overflow-y:auto\">\n        <div style=\"max-width:900px;margin:0 auto;padding:30px 34px 60px\">\n          <div style=\"border-radius:22px;padding:24px;margin-bottom:18px;background:linear-gradient(140deg,#241a48 0%,#1b2a55 58%,#14315f 100%);box-shadow:0 14px 40px -12px rgba(40,30,90,.5),inset 0 1px 0 rgba(255,255,255,.08)\">\n            <div style=\"display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap\">\n              <span style=\"width:44px;height:44px;flex:none;border-radius:12px;background:linear-gradient(135deg,#8b6cff,#3f74e0);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(90,90,230,.45)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M19 8v6M22 11h-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"flex:1;min-width:220px\">\n                <div style=\"font-size:18px;font-weight:700;color:#fff\">Aggiungi cliente all'incasso<\u002Fdiv>\n                <div style=\"font-size:13px;color:#b7bbcf;line-height:1.55;margin-top:6px\">Quando chiudi il conto su Zucchetti, il PC apre <b style=\"color:#fff;font-weight:600\">da solo<\u002Fb> questa schermata veloce, già agganciata al tavolo e all'importo. Tu digiti solo <b style=\"color:#c4bcff;font-weight:600\">telefono<\u002Fb>, il nome se lo vuoi, e tocchi il consenso. Un tocco, mentre incassi — non rincorri i tavoli, non riempi colonne.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px;color:#8fd6ff;background:rgba(80,130,215,.16);padding:7px 12px;border-radius:20px\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M2 10h20\"><\u002Fpath><\u002Fsvg>Tavolo e conto già compilati da Zucchetti<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px;color:#a99bff;background:rgba(124,108,255,.16);padding:7px 12px;border-radius:20px\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Un click in meno di prima<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ openIncasso }}\" style=\"all:unset;cursor:pointer;margin-top:16px;display:inline-flex;align-items:center;gap:8px;background:#fff;color:#1a1a1a;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700\" style-active=\"transform:scale(.98)\">Prova la schermata<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px\">\n            <div style=\"background:#fff;border-radius:20px;padding:22px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <div style=\"width:40px;height:40px;border-radius:11px;background:rgba(74,127,181,.14);display:flex;align-items:center;justify-content:center;color:#3a6a9a\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-3-6.7L21 8\"><\u002Fpath><path d=\"M21 3v5h-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div><div style=\"font-size:16px;font-weight:700\">Collegamento Zucchetti<\u002Fdiv><div style=\"font-size:12.5px;color:#6b665c\">Sincronizzazione SFTP<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;margin-top:18px;padding:12px 14px;background:rgba(52,168,83,.09);border-radius:12px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:#34A853;box-shadow:0 0 0 4px rgba(52,168,83,.18)\"><\u002Fspan>\n                <span style=\"font-size:13.5px;font-weight:600;color:#1f7a3d\">Servizio attivo · in diretta<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:16px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:7px\">\n                  <span style=\"font-size:12.5px;font-weight:600;color:#6b665c\">Stringa di collegamento<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:#7a746a;background:rgba(0,0,0,.05);padding:3px 8px;border-radius:7px\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>Bloccata · sola lettura<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:9px;padding:11px 13px;background:#f4f2ee;border:1px solid rgba(0,0,0,.07);border-radius:11px;color:#8a857c\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a857c\" stroke-width=\"1.8\" style=\"flex:none\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n                  <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">sftp://zuc-demo:••••••@tiratissima.zucchetti.it<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;color:#7a746a;margin-top:8px;line-height:1.45\">La configurazione la teniamo noi di <b style=\"color:#8a6a24\">LUX LAB<\u002Fb>, dal backend. Tu vedi solo se il servizio è attivo — non c'è niente da toccare.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06);font-size:13.5px\"><span style=\"color:#6b665c\">Record sincronizzati oggi<\u002Fspan><b class=\"tn\">47<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;margin-top:9px;font-size:13.5px\"><span style=\"color:#6b665c\">Ultima sync<\u002Fspan><b class=\"tn\">2 min fa<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#fff;border-radius:20px;padding:22px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n              <div style=\"font-size:16px;font-weight:700\">Zucchetti Recovery System<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#6b665c;line-height:1.5;margin-top:8px\">Se il gestionale salta o chiudi un conto per sbaglio, lo ripeschi: il sistema <b style=\"color:#1a1a1a;font-weight:600\">salva tutto ogni 5 minuti<\u002Fb> e lo riscrive su Zucchetti, senza perdere nulla.<\u002Fdiv>\n              <label style=\"font-size:12.5px;font-weight:600;color:#6b665c;display:block;margin:16px 0 6px\">Numero tavolo<\u002Flabel>\n              <div style=\"display:flex;gap:10px\">\n                <div style=\"flex:1;position:relative\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9a948a\" stroke-width=\"1.9\" style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%)\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10h18M6 10V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4M5 10v10M19 10v10\"><\u002Fpath><\u002Fsvg>\n                  <input value=\"{{ recoverTable }}\" oninput=\"{{ onRecoverTable }}\" placeholder=\"es. 12\" style=\"width:100%;box-sizing:border-box;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:12px 12px 12px 36px;font-size:15px;outline:none;background:#faf9f6\" style-focus=\"border-color:#CBA24C;background:#fff\">\n                <\u002Fdiv>\n                <button onclick=\"{{ recoverConto }}\" style=\"all:unset;cursor:pointer;padding:0 18px;display:flex;align-items:center;border-radius:12px;background:#1A1A1A;color:#fff;font-size:14px;font-weight:600\" style-active=\"transform:scale(.97)\">Ripesca il conto<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px;margin-top:12px;font-size:12px;color:#1f7a3d\"><span style=\"width:7px;height:7px;border-radius:50%;background:#34A853;box-shadow:0 0 0 3px rgba(52,168,83,.18)\"><\u002Fspan>Backup automatico ogni 5 minuti · ultimo 2 min fa<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border-radius:20px;padding:24px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55);margin-top:18px\">\n            <div style=\"font-size:16px;font-weight:700\">Storico dati<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#6b665c;margin-top:4px;line-height:1.5\">La tua storia — clienti, conti, abitudini — viene caricata e messa a punto insieme a <b style=\"color:#8a6a24\">LUX LAB<\u002Fb>. Puoi comunque caricare tu un file quando vuoi.<\u002Fdiv>\n            <button onclick=\"{{ doImport }}\" style=\"all:unset;cursor:pointer;display:block;width:100%;box-sizing:border-box;border:1.5px dashed rgba(0,0,0,.16);border-radius:16px;padding:28px;text-align:center;margin-top:18px;transition:all .16s\" style-hover=\"border-color:#CBA24C;background:rgba(206,164,78,.04)\">\n              <div style=\"width:46px;height:46px;margin:0 auto 12px;border-radius:13px;background:rgba(31,138,76,.12);display:flex;align-items:center;justify-content:center;color:#1F8A4C\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"m9 15 3-3 3 3\"><\u002Fpath><path d=\"M12 12v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:14.5px;font-weight:600\">Trascina un Excel<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6b665c;margin-top:3px\">.xlsx · .csv — o clicca per caricare<\u002Fdiv>\n            <\u002Fbutton>\n            <sc-if value=\"{{ importDone }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-top:16px;padding:15px 18px;background:rgba(52,168,83,.1);border-radius:14px\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f7a3d\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                <div><div style=\"font-size:14.5px;font-weight:700;color:#1f7a3d\">312 clienti storici caricati<\u002Fdiv><div style=\"font-size:12.5px;color:#4a7a5a\">Pronti da rivedere e unire alla rubrica.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isSetup }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;overflow-y:auto\">\n        <div style=\"max-width:900px;margin:0 auto;padding:30px 34px 60px\">\n          <div style=\"font-size:15px;color:#6b665c;margin-bottom:20px\">Poche cose da te, e il sistema diventa <b style=\"color:#1a1a1a;font-weight:600\">tuo<\u002Fb>.<\u002Fdiv>\n\n          <div style=\"background:#fff;border-radius:20px;padding:24px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n            <div style=\"font-size:17px;font-weight:700\">Il tono di Andrea<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#6b665c;margin-top:4px;line-height:1.5\">Incolla 20–30 tuoi messaggi WhatsApp reali. Impariamo come ringrazi, a chi dai del tu o del lei, le tue parole, come ti firmi — e cosa non dire mai.<\u002Fdiv>\n            <textarea value=\"{{ toneText }}\" oninput=\"{{ onTone }}\" rows=\"4\" placeholder=\"Es. 'Ciao Fede! Grazie mille di ieri, è stato un piacere 🙏 A presto, Andrea'…\" style=\"width:100%;margin-top:14px;border:1px solid rgba(0,0,0,.1);border-radius:13px;padding:14px;font-size:14px;line-height:1.5;outline:none;background:#faf9f6\" style-focus=\"border-color:#CBA24C;background:#fff\"><\u002Ftextarea>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px\">\n              <span style=\"font-size:12.5px;color:#6b665c;background:rgba(0,0,0,.05);padding:6px 11px;border-radius:8px\">Do del tu<\u002Fspan>\n              <span style=\"font-size:12.5px;color:#6b665c;background:rgba(0,0,0,.05);padding:6px 11px;border-radius:8px\">Uso le emoji con misura<\u002Fspan>\n              <span style=\"font-size:12.5px;color:#6b665c;background:rgba(0,0,0,.05);padding:6px 11px;border-radius:8px\">Mi firmo \"Andrea\"<\u002Fspan>\n              <span style=\"font-size:12.5px;color:#6b665c;background:rgba(0,0,0,.05);padding:6px 11px;border-radius:8px\">Mai insistente<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px;padding:15px 16px;background:rgba(206,164,78,.07);border-radius:13px\">\n              <div style=\"font-size:12.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8a6a24;margin-bottom:7px\">Così suonerà un tuo messaggio<\u002Fdiv>\n              <div style=\"font-size:14px;font-style:italic;color:#4a4a4a;line-height:1.5\">\"Ciao Giulia! Che piacere ieri sera 🙏 Se ti va, la prossima volta ti faccio assaggiare il nuovo Aperol della casa. A presto, Andrea\"<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:18px\">\n            <div style=\"background:#fff;border-radius:20px;padding:22px;box-shadow:0 1px 2px rgba(30,25,60,.05),0 10px 30px -8px rgba(60,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n              <div style=\"font-size:16px;font-weight:700\">Il locale<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:14px\">\n                <button onclick=\"{{ openMenu }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px ,50,110,.12),inset 0 1px 0 rgba(255,255,255,.8),inset 0 0 0 1px rgba(255,255,255,.55)\">\n              <div style=\"font-size:16px;font-weight:700\">Etichette di partenza<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6b665c;margin-top:4px\">Le categorie con cui parti. Puoi aggiungerne o toglierne quando vuoi.<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:14px\">\n                <sc-for list=\"{{ startLabelChips }}\" as=\"l\" hint-placeholder-count=\"5\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px;padding:7px 9px 7px 13px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(206,164,78,.13);color:#8a6a24\">{{ l.name }}<button onclick=\"{{ l.remove }}\" style=\"all:unset;cursor:pointer;display:flex;opacity:.6\" style-hover=\"opacity:1\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;margin-top:12px\">\n                <input value=\"{{ newStartLabel }}\" oninput=\"{{ onNewStartLabel }}\" placeholder=\"Crea una nuova etichetta…\" style=\"flex:1;min-width:0;border:1px solid rgba(0,0,0,.1);border-radius:11px;padding:10px 12px;font-size:13.5px;outline:none;background:#faf9f6\" style-focus=\"border-color:#CBA24C;background:#fff\">\n                <button onclick=\"{{ addStartLabel }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 14px;border-radius:11px;background:#1A1A1A;color:#fff;font-size:13.5px;font-weight:600\" style-active=\"transform:scale(.97)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Crea<\u002F flex-wrap:wrap;gap:9px;margin-top:16px\">\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#1f7a3d;background:rgba(52,168,83,.1);padding:7px 12px;border-radius:9px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>GDPR conforme<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#1f7a3d;background:rgba(52,168,83,.1);padding:7px 12px;border-radius:9px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>EU AI Act<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#1f7a3d;background:rgba(52,168,83,.1);padding:7px 12px;border-radius:9px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Consenso tracciato con data e ora<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#1f7a3d;background:rgba(52,168,83,.1);padding:7px 12px;border-radius:9px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Dati archiviati in UE<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#1f7a3d;background:rgba(52,168,83,.1);padding:7px 12px;border-radius:9px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Decisioni AI trasparenti<\u002Fspan>\n            <\u002Fdiv ,18,14,.42);backdrop-filter:blur(3px);z-index:100;animation:bkIn .25s ease both;display:flex;align-items:flex-end;justify-content:center\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:520px;max-height:92vh;overflow-y:auto;background:#F6F5F2;border-radius:26px 26px 0 0;padding:8px 26px 30px;animation:sheetUp .42s cubic-bezier(.22,1,.36,1) both;box-shadow:0 -12px 50px rgba(0,0,0,.28)\">\n        <div style=\"width:38px;height:5px;border-radius:3px;background:rgba(0,0,0,.15);margin:10px auto 16px\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n          <div style=\"font-family:'Marcellus',Georgia,serif;font-size:26px;font-weight:400\">Invito su WhatsApp<\u002Fdiv>\n          <button onclick=\"{{ closeSheet }}\" style=\"all:unset;cursor:pointer;color:#6b665c;font-size:15px;font-weight:600\">Annulla<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#6b665c;line-height:1.5;margin-bottom:18px\">Dai risultati di «<b style=\"color:#1a1a1a;font-weight:600\">{{ inviteQuery }}<\u002Fb>». Arriva a <b class=\"tn\" style=\"color:#1f7a3d\">{{ inviteReach }}<\u002Fb> clienti — solo a chi ha dato il consenso.<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:600;color:#857f74;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px\">Scrivi il messaggio<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;align-items:center\">\n          <sc-for list=\"{{ invitePresets }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ p.pick }}\" style=\"all:unset;cursor:pointer;padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:600;background:#fff;border:1px solid rgba(0,0,0,.1);color:#4a4a4a\" style-hover=\"border-color:#CBA24C;color:#8a6a24\">{{ p.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n          <span style=\"font-size:11.5px;color:#857f74\">o scrivi il tuo<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#E7DED3;border-radius:16px;padding:12px\">\n          <textarea value=\"{{ inviteMsg }}\" oninput=\"{{ onInviteMsg }}\" rows=\"4\" style=\"width:100%;box-sizing:border-box;background:#DCF8C6;border:none;border-radius:12px 12px 4px 12px;padding:12px 14px;font-size:14px;line-height:1.5;color:#1a2e1a;outline:none;box-shadow:0 1px 1px rgba(0,0,0,.08)\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button onclick=\"{{ sendInvite }}\" style=\"width:100%;margin-top:16px;cursor:pointer;border:none;background:#1F8A4C;color:#fff;border-radius:14px;padding:15px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px\" style-active=\"transform:scale(.98)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m22 2-7 20-4-9-9-4Z\"><\u002Fpath><path d=\"M22 2 11 13\"><\u002Fpath><\u002Fsvg>Invia ora a {{ inviteReach }} clienti<\u002Fbutton>\n        <div style=\"text-align:center;font-size:12px;color:#7a746a;margin-top:10px\">Col tono di Andrea · consegna tracciata<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ sheetForget }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSheet }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.42);backdrop-filter:blur(3px);z-index:100;animation:bkIn .25s ease both;display:flex;align-items:flex-end;justify-content:center\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:500px;max-height:92vh;overflow-y:auto;background:#F6F5F2;border-radius:26px 26px 0 0;padding:8px 26px 30px;animation:sheetUp .42s cubic-bezier(.22,1,.36,1) both;box-shadow:0 -12px 50px rgba(0,0,0,.28)\">\n        <div style=\"width:38px;height:5px;border-radius:3px;background:rgba(0,0,0,.15);margin:10px auto 16px\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n          <div style=\"font-family:'Marcellus',Georgia,serif;font-size:26px;font-weight:400\">Diritto all'oblio<\u002Fdiv>\n          <button onclick=\"{{ closeSheet }}\" style=\"all:unset;cursor:pointer;color:#6b665c;font-size:15px;font-weight:600\">Annulla<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#6b665c;line-height:1.5;margin-bottom:16px\">Cancellare un cliente elimina <b style=\"color:#1a1a1a;font-weight:600\">tutto<\u002Fb> quello che il sistema sa di lui. È definitivo.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:14px\">\n          <div style=\"display:flex;gap:12px;padding:13px 14px;background:#fff;border-radius:13px\">\n            <div style=\"width:34px;height:34px;flex:none;border-radius:9px;background:rgba(74,127,181,.13);display:flex;align-items:center;justify-content:center;color:#3a6a9a\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5\"><\u002Fpath><path d=\"M3 12c0 1.7 4 3 9 3s9-1.3 9-3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div style=\"font-size:13.5px;font-weight:600\">I dati<\u002Fdiv><div style=\"font-size:12.5px;color:#6b665c;line-height:1.4\">Anagrafica, telefono, visite, spesa — i record salvati sul server.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px;padding:13px 14px;background:#fff;border-radius:13px\">\n            <div style=\"width:34px;height:34px;flex:none;border-radius:9px;background:rgba(206,164,78,.16);display:flex;align-items:center;justify-content:center;color:#B07E1E\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v3m0 12v3M3 12h3m12 0h3M5.6 5.6l2.1 2.1m8.6 8.6 2.1 2.1m0-12.8-2.1 2.1M7.7 16.3l-2.1 2.1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div style=\"font-size:13.5px;font-weight:600\">La memoria AI<\u002Fdiv><div style=\"font-size:12.5px;color:#6b665c;line-height:1.4\">Note, abitudini, etichette e ciò che il sistema ha imparato su di lui.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#7a746a;line-height:1.45;margin-bottom:18px;padding:0 2px\">Qui i due sono legati: la memoria è costruita <b style=\"color:#1a1a1a;font-weight:600\">sui dati<\u002Fb> salvati sul server. L'oblio cancella entrambi in un colpo solo.<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:600;color:#857f74;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px\">Scegli i clienti — anche più di uno<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:20px\">\n          <sc-for list=\"{{ forgetList }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ c.pick }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:12px;border:1.5px solid {{ c.selBd }};background:{{ c.selBg }}\">\n              <div style=\"width:34px;height:34px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;background:{{ c.avatarBg }}\">{{ c.initials }}<\u002Fdiv>\n              <span style=\"flex:1;font-size:14px;font-weight:600\">{{ c.name }}<\u002Fspan>\n              <sc-if value=\"{{ c.on }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:22px;height:22px;border-radius:50%;background:#E5484D;display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"position:sticky;bottom:-30px;margin:0 -26px -30px;padding:14px 26px 24px;background:linear-gradient(180deg,rgba(246,245,242,0),#F6F5F2 26%);border-radius:0 0 26px 26px\">\n          <sc-if value=\"{{ forgetStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ goForgetConfirm }}\" style=\"width:100%;cursor:pointer;border:none;background:{{ forgetBtnBg }};color:#fff;border-radius:14px;padding:15px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s;box-shadow:0 6px 18px rgba(229,72,77,.25)\" style-active=\"transform:scale(.98)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>{{ forgetBtnLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ forgetStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:rgba(229,72,77,.08);border:1.5px solid rgba(229,72,77,.3);border-radius:14px;padding:14px 16px;margin-bottom:10px\">\n              <div style=\"font-size:14px;font-weight:700;color:#c33236\">Sei proprio sicuro?<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#6b665c;line-height:1.45;margin-top:4px\">Stai per cancellare per sempre <b style=\"color:#1a1a1a\">{{ forgetName }}<\u002Fb>. Non si può tornare indietro.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px\">\n              <button onclick=\"{{ backForget }}\" style=\"flex:1;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:#fff;color:#1a1a1a;border-radius:14px;padding:14px;font-size:14.5px;font-weight:600\" style-active=\"transform:scale(.98)\">No, annulla<\u002Fbutton>\n              <button onclick=\"{{ confirmForget }}\" style=\"flex:1;cursor:pointer;border:none;background:#E5484D;color:#fff;border-radius:14px;padding:14px;font-size:14.5px;font-weight:600\" style-active=\"transform:scale(.98)\">Sì, elimina definitivamente<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ sheetConfirmSend }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSheet }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.42);backdrop-filter:blur(3px);z-index:100;animation:bkIn .25s ease both;display:flex;align-items:flex-end;justify-content:center\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:460px;background:#F6F5F2;border-radius:26px 26px 0 0;padding:8px 26px 30px;animation:sheetUp .42s cubic-bezier(.22,1,.36,1) both;box-shadow:0 -12px 50px rgba(0,0,0,.28)\">\n        <div style=\"width:38px;height:5px;border-radius:3px;background:rgba(0,0,0,.15);margin:10px auto 18px\"><\u002Fdiv>\n        <div style=\"width:56px;height:56px;margin:0 auto 16px;border-radius:16px;background:rgba(31,138,76,.12);display:flex;align-items:center;justify-content:center;color:#1F8A4C\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m22 2-7 20-4-9-9-4Z\"><\u002Fpath><path d=\"M22 2 11 13\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div style=\"font-family:'Marcellus',Georgia,serif;font-size:24px;font-weight:400;text-align:center\">Mandare adesso?<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6b665c;line-height:1.5;text-align:center;margin-top:10px;max-width:360px;margin-left:auto;margin-right:auto\">Stai per mandare <b style=\"color:#1a1a1a;font-weight:600\">{{ confirmSendTitle }}<\u002Fb>. {{ confirmSendTarget }}. È un invio reale: controlla prima di procedere.<\u002F n      <button onclick=\"{{ login }}\" style=\"margin-top:6px;cursor:pointer;border:none;background:linear-gradient(140deg,#E7C463,#CBA24C);color:#1a1a1a;border-radius:13px;padding:16px;font-size:16px;font-weight:700;transition:transform .12s;box-shadow:0 8px 24px rgba(206,164,78,.3)\" style-active=\"transform:scale(.98)\">Entra nel gestionale<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:12.5px;color:#6a635b;margin-top:20px;line-height:1.5\">Modalità dimostrativa — entra con<br>qualsiasi email e password.<\u002Fdiv>\n    <div style=\"text-align:center;font-size:12px;color:#4a453f;margin-top:26px;letter-spacing:.08em\">LUX LAB S.R.L. · ANTEPRIMA DEMO<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ showCookieBanner }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:5;display:flex;justify-content:center;padding:16px\">\n      <div style=\"width:100%;max-width:620px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:16px 20px;border-radius:18px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(160deg,rgba(28,32,44,.86),rgba(16,19,28,.86));backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.12)\">\n        <div style=\"flex:1;min-width:220px;font-size:13px;color:#cfd3dc;line-height:1.5\">Usiamo <b style=\"color:#fff;font-weight:600\">cookie tecnici<\u002Fb> per far funzionare l'accesso al gestionale. Nessun cookie di profilazione o pubblicità. <span onclick=\"{{ openCookiePrefs }}\" style=\"color:#E7C463;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px\">Preferenze<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:9px;flex:none\">\n          <button onclick=\"{{ rejectCookies }}\" style=\"all:unset;cursor:pointer;padding:11px 16px;border-radius:11px;font-size:13.5px;font-weight:600;color:#dfe2e9;bor ayPhoneEmpty: !s.payPhone,\n      payName:s.payName, onPayName:e=>self.setState({payName:e.target.value}),\n      payKey:(d)=>{ if((s.payPhone||'').replace(/\\D/g,'').length>=10) return; self.setState({payPhone:(s.payPhone||'')+d}); },\n      payKey0:()=>self.pk('0'), payKey1:()=>self.pk('1'), payKey2:()=>self.pk('2'), payKey3:()=>self.pk('3'), payKey4:()=>self.pk('4'), payKey5:()=>self.pk('5'), payKey6:()=>self.pk('6'), payKey7:()=>self.pk('7'), payKey8:()=>self.pk('8'), payKey9:()=>self.pk('9'),\n      payDel:()=>self.setState({payPhone:(s.payPhone||'').slice(0,-1)}),\n      pcSi: self.seg(s.payConsent==='si'), pcNo: self.seg(s.payConsent==='no'), pcDopo: self.seg(s.payConsent==='dopo'),\n      setPaySi:()=>self.setState({payConsent:'si'}), setPayNo:()=>self.setState({payConsent:'no'}), setPayDopo:()=>self.setState({payConsent:'dopo'}),\n      payBtnBg: (!!s.payPhone && !!s.payConsent) ? '#1F8A4C' : 'rgba(31,138,76,.4)',\n      payDone: s.payDone,\n      saveIncasso:()=>{ if(!s.payPhone||!s.payConsent){ self.toast('Telefono e consenso, poi salvi'); return; } const nm=(s.payName||'').trim()||('Tavolo '+s.payTable); self.setState({ payDone:s.payDone+1, payTable:s.payTable+1, payAmount:(30+Math.floor(Math.random()*90))+',00', payPhone:'', payName:'', payConsent:null }); self.toast(nm+' salvato · passa al prossimo'); },\n      recoverConto:()=>{ const t=(s.recoverTable||'').trim(); self.toast(t ? ('Conto del tavolo '+t+' ripescato e riscritto su Zucchetti ↻') : 'Scrivi il numero del tavolo'); },\n      doImport:()=>{ self.setState({importDone:true}); self.toast('312 clienti storici caricati'); },\n      photoAgenda:()=>self.toast('Agenda letta — anteprima pronta 📷'),\n      // setup\n      toneText:s.toneText, onTone:e=>self.setState({toneText:e.target.value}),\n      hasTone: s.toneText.trim().length>0,\n      startLabelChips, saveSetup:()=>self.toast('Impostazioni salvate'),\n      newStartLabel: s.newStartLabel,\n      onNewStartLabel: e=>self.setState({ newStartLabel: e.target.value }),\n      addStartLabel: ()=>{ const v=(self.state.newStartLabel||'').trim(); if(!v) return; self.setState(st=>({ startLabels: st.startLabels.includes(v)?st.startLabels:[...st.startLabels, v], newStartLabel:'' })); self.toast('Etichetta «'+v+'» creata'); },\n      twoFA: s.twoFA, two2seg: flowSeg(s.twoFA),\n      twoTrack: s.twoFA ? '#34A853' : 'rgba(0,0,0,.18)', twoKnob: s.twoFA ? 'translateX(20px)' : 'translateX(0)',\n      toggle2FA:()=>self.setState(st=>({twoFA:!st.twoFA})),\n      changePassword:()=>self.toast('Password aggiornata'),\n      consentAderito, consentRifiutato,\n      countAderito: consentAderito.length, countRifiutato: consentRifiutato.length,\n      forgetList, forgetReady: forgetCount>0, forgetName, forgetCount,\n      forgetStep1: s.forgetStep===1, forgetStep2: s.forgetStep===2,\n      forgetBtnLabel: forgetCount===0 ? 'Scegli almeno un cliente' : (forgetCount===1 ? ('Elimina '+forgetName) : ('Elimina '+forgetCount+' clienti')),\n      forgetBtnBg: forgetCount>0 ? '#E5484D' : 'rgba(229,72,77,.35)',\n      goForgetConfirm: ()=>{ if(self.state.forgetIds.length>0) self.setState({forgetStep:2}); },\n      backForget: ()=>self.setState({forgetStep:1}),\n      sheetForget: s.sheet && s.sheet.type==='forget',\n      openForget: ()=>self.setState({ sheet:{type:'forget'}, forgetIds:[], forgetStep:1 }),\n      confirmForget: ()=>{ const ids=self.state.forgetIds; if(!ids.length) return; const cnt=ids.length; self.setState(st=>({ clients: st.clients.filter(x=>!ids.includes(x.id)), sheet:null, forgetIds:[], forgetStep:1, selectedId: ids.includes(st.selectedId)?null:st.selectedId })); self.toast(cnt===1 ? 'Cancellato per sempre' : ('Cancellati per sempre '+cnt+' clienti')); },\n      // toasts\n      toasts:s.toasts,\n      // menu\n      menuData, sheetMenu: s.sheet && s.sheet.type==='menu',\n      openMenu: ()=>self.setState({sheet:{type:'menu'}}),\n      // cookie / gdpr\n      showCookieBanner: !s.cookieConsent,\n      cookiePrefsOpen: s.cookiePrefs,\n      acceptCookies: ()=>{ try{localStorage.setItem('tira_cookie','all');}catch(e){} self.setState({cookieConsent:'all',cookiePrefs:false}); self.toast('Preferenze cookie salvate'); },\n      rejectCookies: ()=>{ try{localStorage.setItem('tira_cookie','essential');}catch(e){} self.setState({cookieConsent:'essential',cookiePrefs:false}); self.toast('Solo cookie necessari'); },\n      openCookiePrefs: ()=>self.setState({cookiePrefs:true}),\n      closeCookiePrefs: ()=>self.setState({cookiePrefs:false}),\n    };\n  }\n\n  setConsent(id, val, viaRegister) {\n    const now = '01/07/2026 · ' + new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});\n    this.setState(st => ({ clients: st.clients.map(c => c.id===id ? { ...c, consent:val, consentDate: val==='si' ? now : c.consentDate } : c) }));\n    if (viaRegister || val==='si') this.toast('Consenso registrato · ' + now);\n    else if (val==='no') this.toast('Aggiornato: non riceve messaggi');\n    else this.toast('Consenso in attesa');\n  }\n\n  removeTag(id, tag) {\n    this.setState(st => ({ clients: st.clients.map(c => c.id===id ? { ...c, tags:c.tags.filter(t=>t!==tag) } : c) }));\n    this.toast('Etichetta rimossa · il sistema se lo ricorda');\n  }\n\n  confirmTag() {\n    const t = this.state.newTag.trim();\n    if (!t) return;\n    const id = this.state.selectedId;\n    this.setState(st => ({ clients: st.clients.map(c => c.id===id && !c.tags.includes(t) ? { ...c, tags:[...c.tags,t] } : c), sheet:null }));\n    this.toast('Etichetta \"'+t+'\" aggiunta');\n  }\n\n  saveNewClient() {\n    const nf = this.state.nf || this.emptyNf();\n    if (!nf.first.trim()) { this.toast('Inserisci almeno il nome'); return; }\n    const id = 'c'+Date.now();\n    const client = {\n      id, first:nf.first.trim(), last:nf.last.trim(), phone:nf.phone||'—',\n      visits:0, lastLine:'nuovo cliente', lastDays:0, spent:0, usual:'—',\n      notes:nf.notes, tags:nf.tags.length?nf.tags:['Nuovo'], consent:nf.consent,\n      consentDate: nf.consent==='si' ? '01/07/2026 · '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) : null,\n      payment:nf.payment, company:nf.company, role:nf.role,\n    };\n    this.setState(st => ({ clients:[...st.clients, client], sheet:null, selectedId:id, section:'clienti', nf:null }));\n    this.toast(client.first+' '+client.last+' aggiunto');\n  }\n\n  openLocked(mod) {\n    this.setState({ sheet:{ type:'locked', mod } });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
